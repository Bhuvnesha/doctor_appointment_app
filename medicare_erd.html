<div id="erd" style="padding:8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#0a3f3f' : '#e0f4f4',
    primaryBorderColor: dark ? '#1a9a9a' : '#0d6e6e',
    primaryTextColor: dark ? '#c2c0b6' : '#1a1a2e',
  },
});
const diagram = `erDiagram
  users {
    bigint id PK
    string name
    string username
    string email
    string password
    enum role
    boolean is_active
    timestamp last_login_at
  }
  departments {
    bigint id PK
    string name
    string slug
    text description
    boolean is_active
  }
  doctors {
    bigint id PK
    bigint department_id FK
    string name
    string email
    string specialization
    string qualification
    decimal rating
    boolean is_available
  }
  doctor_schedules {
    bigint id PK
    bigint doctor_id FK
    tinyint day_of_week
    time start_time
    time end_time
    tinyint slot_duration_minutes
  }
  patients {
    bigint id PK
    string name
    string email
    string phone
    date date_of_birth
    enum gender
    string blood_group
    string insurance_provider
  }
  appointments {
    bigint id PK
    bigint patient_id FK
    bigint doctor_id FK
    bigint department_id FK
    bigint managed_by FK
    date appointment_date
    time appointment_time
    enum appointment_type
    enum status
    text symptoms
    string reference_code
  }
  appointment_notes {
    bigint id PK
    bigint appointment_id FK
    bigint created_by FK
    text note
    enum type
  }
  time_slots {
    bigint id PK
    bigint doctor_id FK
    bigint appointment_id FK
    date slot_date
    time slot_time
    boolean is_booked
    boolean is_blocked
  }
  audit_logs {
    bigint id PK
    bigint user_id FK
    bigint appointment_id FK
    string action
    json old_values
    json new_values
  }

  departments ||--o{ doctors : "has many"
  doctors ||--o{ doctor_schedules : "has many"
  doctors ||--o{ appointments : "has many"
  doctors ||--o{ time_slots : "has many"
  patients ||--o{ appointments : "has many"
  departments ||--o{ appointments : "has many"
  users ||--o{ appointments : "manages"
  appointments ||--o{ appointment_notes : "has many"
  appointments ||--o{ audit_logs : "tracked by"
  appointments ||--o| time_slots : "occupies"
  users ||--o{ appointment_notes : "writes"
  users ||--o{ audit_logs : "creates"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
